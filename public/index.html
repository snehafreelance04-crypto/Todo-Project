<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 16px; }
    .container { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
    h1 { font-size: 24px; margin-bottom: 20px; color: #1a1a2e; }
    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    input[type="text"]:focus { border-color: #4f46e5; }
    button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-add { background: #4f46e5; color: white; }
    .btn-add:hover { background: #4338ca; }
    .task-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .task-item { display: flex; align-items: center; gap: 8px; padding: 12px 14px; background: #f8f9ff; border: 1px solid #e8eaf6; border-radius: 8px; }
    .task-title { flex: 1; font-size: 15px; color: #333; }
    .edit-input { flex: 1; padding: 4px 8px; border: 1px solid #4f46e5; border-radius: 6px; font-size: 15px; display: none; }
    .btn-edit { background: #f59e0b; color: white; padding: 6px 12px; font-size: 13px; }
    .btn-save { background: #10b981; color: white; padding: 6px 12px; font-size: 13px; display: none; }
    .btn-delete { background: #ef4444; color: white; padding: 6px 12px; font-size: 13px; }
    .empty { text-align: center; color: #aaa; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App</h1>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Enter a task..." />
      <button class="btn-add" onclick="addTask()">Add</button>
    </div>
    <ul class="task-list" id="taskList"></ul>
    <p class="empty" id="emptyMsg" style="display:none">No tasks yet. Add one above!</p>
  </div>

  <script>
    const API = "http://localhost:3000/tasks";

    async function loadTasks() {
      const res = await fetch(API);
      const tasks = await res.json();
      renderTasks(tasks);
    }

    function renderTasks(tasks) {
  const list = document.getElementById("taskList");
  const empty = document.getElementById("emptyMsg");
  list.innerHTML = "";
  if (tasks.length === 0) { empty.style.display = "block"; return; }
  empty.style.display = "none";
  tasks.forEach(task => {
    const li = document.createElement("li");
    li.className = "task-item";
    li.innerHTML = `
      <span class="task-title" id="title-${task.id}">${task.title}</span>
      <input class="edit-input" id="edit-${task.id}" value="${task.title}" />
      <button class="btn-edit" id="editBtn-${task.id}" onclick="startEdit('${task.id}')">✏️ Edit</button>
      <button class="btn-save" id="saveBtn-${task.id}" onclick="saveEdit('${task.id}')">💾 Save</button>
      <button class="btn-delete" onclick="deleteTask('${task.id}')">🗑️ Delete</button>
    `;
    list.appendChild(li);
  });
}
      

    async function addTask() {
      const input = document.getElementById("taskInput");
      const title = input.value.trim();
      if (!title) return alert("Please enter a task!");
      await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title })
      });
      input.value = "";
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`${API}/${id}`, { method: "DELETE" });
      loadTasks();
    }

    function startEdit(id) {
      document.getElementById(`title-${id}`).style.display = "none";
      document.getElementById(`edit-${id}`).style.display = "block";
      document.getElementById(`editBtn-${id}`).style.display = "none";
      document.getElementById(`saveBtn-${id}`).style.display = "block";
    }

    async function saveEdit(id) {
      const newTitle = document.getElementById(`edit-${id}`).value.trim();
      if (!newTitle) return alert("Title cannot be empty!");
      await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: newTitle })
      });
      loadTasks();
    }

    document.getElementById("taskInput").addEventListener("keydown", e => {
      if (e.key === "Enter") addTask();
    });

    loadTasks();
  </script>
</body>
</html>
